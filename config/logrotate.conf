# Configuration logrotate pour BLETrack
# Copier dans /etc/logrotate.d/bletrack sur le Pi 4
#
#   sudo cp /opt/bletrack/config/logrotate.conf /etc/logrotate.d/bletrack

/opt/bletrack/logs/*.log {
    daily                   # Rotation quotidienne
    rotate 7                # Conserver 7 jours
    compress                # Compresser les anciens fichiers (.gz)
    delaycompress           # Compresser J-1 (pas le fichier d'aujourd'hui)
    missingok               # Ne pas échouer si le fichier n'existe pas
    notifempty              # Ne pas tourner si le fichier est vide
    copytruncate            # Tronquer le fichier original (pas besoin de redémarrer le service)
    dateext                 # Ajouter la date dans le nom du fichier archivé
    dateformat -%Y-%m-%d
}
