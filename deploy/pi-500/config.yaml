server:
  host: "0.0.0.0"
  port: 8000

database:
  path: "./bletrack.db"

jwt:
  secret: "bletrack-secret-change-in-production"
  algorithm: "HS256"
  expire_minutes: 30

mqtt:
  broker: "10.0.1.10"   # IP RJ45 du maître
  port: 1883
  topic_prefix: "bletrack"
  enabled: true

redis:
  host: "localhost"
  port: 6379
  ttl: 30
  enabled: false

gateways:
  - id: "gw2"
    name: "Gateway Pi500"
    ip: "10.0.1.20"
    floor: 1
    x: 27.0
    y: 5.0

ble:
  rssi_1m: -59
  path_loss: 2.5
  buffer_size: 4
  tag_timeout: 30

positioning:
  save_interval: 5
  history_retention_days: 30
  simulation_mode: false

building:
  width: 30.0
  height: 10.0
  floors: 10
