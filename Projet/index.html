<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLETrack — Système de localisation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Chakra+Petch:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #060a0f;
            --bg-panel: #0b1018;
            --bg-surface: #101822;
            --bg-elevated: #162030;
            --border-dim: rgba(45, 65, 95, 0.4);
            --border-active: rgba(60, 140, 200, 0.3);
            --text-primary: #c8d6e5;
            --text-dim: #4a6080;
            --text-ghost: #253545;
            --accent: #2d8ac4;
            --accent-bright: #3da5e8;
            --accent-glow: rgba(45, 138, 196, 0.12);
            --accent-glow-strong: rgba(45, 138, 196, 0.25);
            --danger: #c44030;
            --danger-dim: rgba(196, 64, 48, 0.15);
            --success: #28a068;
            --success-dim: rgba(40, 160, 104, 0.12);
            --amber: #c49030;
            --amber-dim: rgba(196, 144, 48, 0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'IBM Plex Mono', monospace;
            background: var(--bg-deep);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* --- Fond grille technique --- */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                linear-gradient(rgba(45, 138, 196, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(45, 138, 196, 0.03) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 50% 50%, transparent 30%, var(--bg-deep) 75%);
            pointer-events: none;
        }

        /* --- Barre d'état supérieure --- */
        .status-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 36px;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border-dim);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            font-size: 10px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-dim);
            z-index: 10;
        }

        .status-bar .status-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 6px var(--success);
            animation: blink 3s ease-in-out infinite;
        }

        .status-dot.warning {
            background: var(--amber);
            box-shadow: 0 0 6px var(--amber);
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .status-bar .clock {
            font-variant-numeric: tabular-nums;
            color: var(--text-primary);
            letter-spacing: 2px;
        }

        /* --- Contenu central --- */
        .main-content {
            position: relative;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 48px;
        }

        /* --- Logo --- */
        .logo-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            animation: fadeIn 1.2s ease-out;
        }

        .logo-marker {
            width: 56px;
            height: 56px;
            border: 1.5px solid var(--border-active);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-bottom: 8px;
        }

        .logo-marker::before {
            content: '';
            width: 10px;
            height: 10px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 20px var(--accent), 0 0 40px var(--accent-glow);
            animation: ping 4s ease-in-out infinite;
        }

        .logo-marker::after {
            content: '';
            position: absolute;
            inset: -8px;
            border: 1px solid rgba(45, 138, 196, 0.08);
            border-radius: 50%;
            animation: ping-ring 4s ease-in-out infinite;
        }

        @keyframes ping {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.15); opacity: 0.7; }
        }

        @keyframes ping-ring {
            0%, 100% { transform: scale(1); opacity: 0.4; }
            50% { transform: scale(1.3); opacity: 0; }
        }

        .logo-title {
            font-family: 'Chakra Petch', sans-serif;
            font-size: 38px;
            font-weight: 700;
            letter-spacing: 8px;
            text-transform: uppercase;
            color: var(--text-primary);
        }

        .logo-title span {
            color: var(--accent);
        }

        .logo-subtitle {
            font-size: 10px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        /* --- Séparateur technique --- */
        .separator {
            width: 200px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-active), transparent);
            position: relative;
            animation: fadeIn 1.6s ease-out;
        }

        .separator::before {
            content: '';
            position: absolute;
            top: -3px;
            left: 50%;
            transform: translateX(-50%);
            width: 7px;
            height: 7px;
            border: 1px solid var(--accent);
            transform: translateX(-50%) rotate(45deg);
            background: var(--bg-deep);
        }

        /* --- Bouton Combat --- */
        .combat-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            animation: fadeIn 2s ease-out;
        }

        .mode-label {
            font-size: 9px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        .btn-combat {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 260px;
            height: 60px;
            background: var(--bg-surface);
            border: 1px solid var(--border-active);
            color: var(--accent-bright);
            font-family: 'Chakra Petch', sans-serif;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 6px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .btn-combat::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--accent-glow) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .btn-combat::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-bright), transparent);
            transition: none;
        }

        .btn-combat:hover {
            background: var(--bg-elevated);
            border-color: var(--accent);
            box-shadow:
                0 0 30px var(--accent-glow),
                inset 0 0 30px var(--accent-glow);
            transform: translateY(-1px);
        }

        .btn-combat:hover::before {
            opacity: 1;
        }

        .btn-combat:hover::after {
            animation: scanline 1.5s linear infinite;
        }

        .btn-combat:active {
            transform: translateY(0);
            background: var(--accent-glow-strong);
        }

        @keyframes scanline {
            to { left: 100%; }
        }

        .btn-combat-icon {
            width: 18px;
            height: 18px;
            position: relative;
            z-index: 1;
        }

        .btn-combat-text {
            position: relative;
            z-index: 1;
        }

        /* --- Coins décoratifs du bouton --- */
        .btn-combat .corner {
            position: absolute;
            width: 8px;
            height: 8px;
            border-color: var(--accent);
            border-style: solid;
            border-width: 0;
            transition: border-color 0.3s;
        }

        .btn-combat .corner.tl { top: -1px; left: -1px; border-top-width: 1.5px; border-left-width: 1.5px; }
        .btn-combat .corner.tr { top: -1px; right: -1px; border-top-width: 1.5px; border-right-width: 1.5px; }
        .btn-combat .corner.bl { bottom: -1px; left: -1px; border-bottom-width: 1.5px; border-left-width: 1.5px; }
        .btn-combat .corner.br { bottom: -1px; right: -1px; border-bottom-width: 1.5px; border-right-width: 1.5px; }

        .btn-combat:hover .corner {
            border-color: var(--accent-bright);
        }

        /* --- Infos bas de page --- */
        .footer-info {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 32px;
            background: var(--bg-panel);
            border-top: 1px solid var(--border-dim);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 32px;
            font-size: 9px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-dim);
            z-index: 10;
        }

        .footer-tag {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .footer-tag .dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
        }

        .footer-tag .dot.green { background: var(--success); }
        .footer-tag .dot.amber { background: var(--amber); }
        .footer-tag .dot.red { background: var(--danger); }

        /* --- Animation d'entrée --- */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Lignes de visée décoratives --- */
        .crosshair {
            position: fixed;
            z-index: 1;
            pointer-events: none;
        }

        .crosshair.h {
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, var(--border-dim) 20%, transparent 40%, transparent 60%, var(--border-dim) 80%, transparent 100%);
            opacity: 0.3;
        }

        .crosshair.v {
            left: 50%;
            top: 0;
            bottom: 0;
            width: 1px;
            background: linear-gradient(180deg, transparent 0%, var(--border-dim) 20%, transparent 40%, transparent 60%, var(--border-dim) 80%, transparent 100%);
            opacity: 0.3;
        }
    </style>
</head>
<body>

    <!-- Lignes de visée -->
    <div class="crosshair h"></div>
    <div class="crosshair v"></div>

    <!-- Barre d'état supérieure -->
    <div class="status-bar">
        <div class="status-left">
            <div class="status-indicator">
                <div class="status-dot"></div>
                <span>Réseau eth0</span>
            </div>
            <div class="status-indicator">
                <div class="status-dot"></div>
                <span>MQTT actif</span>
            </div>
            <div class="status-indicator">
                <div class="status-dot warning"></div>
                <span>2 gateways</span>
            </div>
        </div>
        <div class="clock" id="clock">--:--:--</div>
    </div>

    <!-- Contenu principal -->
    <div class="main-content">

        <div class="logo-block">
            <div class="logo-marker"></div>
            <div class="logo-title">BLE<span>Track</span></div>
            <div class="logo-subtitle">Système de localisation indoor</div>
        </div>

        <div class="separator"></div>

        <div class="combat-section">
            <div class="mode-label">Sélection du mode</div>
            <button class="btn-combat" onclick="window.location.href='/login?mode=combat'">
                <span class="corner tl"></span>
                <span class="corner tr"></span>
                <span class="corner bl"></span>
                <span class="corner br"></span>
                <svg class="btn-combat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <circle cx="12" cy="12" r="3"/>
                    <line x1="12" y1="2" x2="12" y2="6"/>
                    <line x1="12" y1="18" x2="12" y2="22"/>
                    <line x1="2" y1="12" x2="6" y2="12"/>
                    <line x1="18" y1="12" x2="22" y2="12"/>
                </svg>
                <span class="btn-combat-text">Combat</span>
            </button>
            <button class="btn-combat" onclick="window.location.href='/alerte'" style="margin-top:10px;border-color:rgba(196,120,48,0.4);color:#c47830">
                <span class="corner tl"></span>
                <span class="corner tr"></span>
                <span class="corner bl"></span>
                <span class="corner br"></span>
                <svg class="btn-combat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                </svg>
                <span class="btn-combat-text">Alertes <span id="alert-badge" style="display:none;background:#c47830;color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;margin-left:6px;vertical-align:middle"></span></span>
            </button>
        </div>

    </div>

    <!-- Panneau gateways -->
    <div id="gw-panel" style="display:none;position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:#0b1018;border:1px solid rgba(45,65,95,0.5);border-bottom:none;border-radius:6px 6px 0 0;z-index:100;min-width:260px;overflow:hidden">
        <div style="padding:7px 14px;font-size:9px;color:#4a6080;letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid rgba(45,65,95,0.3)">État des gateways</div>
        <div id="gw-panel-list"></div>
    </div>

    <!-- Barre inférieure -->
    <div class="footer-info" id="footer-info">
        <div class="footer-tag">
            <div class="dot" style="background:var(--text-dim)"></div>
            <span>Chargement…</span>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = `${h}:${m}:${s}`;
        }
        updateClock();
        setInterval(updateClock, 1000);

        document.addEventListener('click', e => {
            const panel = document.getElementById('gw-panel');
            if (panel.style.display !== 'none'
                && !panel.contains(e.target)
                && !e.target.closest('#gw-footer-btn'))
                panel.style.display = 'none';
        });

        // Son d'alerte
        function playAlert() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                [[880, 0], [660, 200]].forEach(([freq, delay]) => {
                    const osc = ctx.createOscillator();
                    const vol = ctx.createGain();
                    osc.connect(vol); vol.connect(ctx.destination);
                    osc.frequency.setValueAtTime(freq, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(freq * 0.5, ctx.currentTime + 0.18);
                    vol.gain.setValueAtTime(0.3, ctx.currentTime);
                    vol.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.18);
                    osc.start(ctx.currentTime + delay / 1000);
                    osc.stop(ctx.currentTime + delay / 1000 + 0.18);
                });
                setTimeout(() => ctx.close(), 600);
            } catch(_) {}
        }

        // Compteur d'alertes BLE via WebSocket public
        const _prevOffline = {};
        let _ready = false;
        (function connectAlerts() {
            const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
            const ws = new WebSocket(`${proto}//${location.host}/ws/alerts`);
            ws.onmessage = e => {
                const msg = JSON.parse(e.data);
                if (msg.type !== 'status') return;

                // Son sur nouvelle alerte
                msg.tags.forEach(t => {
                    const wasOffline = _prevOffline[t.tag_mac];
                    const isOffline  = !t.online;
                    if (_ready && isOffline && !wasOffline) playAlert();
                    _prevOffline[t.tag_mac] = isOffline;
                });
                if (!_ready) _ready = true;

                // Badge alertes
                const offlineCount = msg.tags.filter(t => !t.online).length;
                const badge = document.getElementById('alert-badge');
                if (offlineCount > 0) { badge.textContent = offlineCount; badge.style.display = 'inline'; }
                else                  { badge.style.display = 'none'; }

                // Footer
                const onlineCount = msg.tags.filter(t => t.online).length;
                const allGwOk     = (msg.gateways || []).every(gw => gw.online);
                const gwCount     = (msg.gateways || []).length;
                const gwColor     = allGwOk ? 'var(--success)' : 'var(--danger)';
                const gwLabel     = allGwOk ? `${gwCount} gateway${gwCount > 1 ? 's' : ''} en ligne` : 'Gateway hors ligne';
                const beaconColor = onlineCount > 0 ? 'var(--amber)' : 'var(--text-dim)';
                document.getElementById('footer-info').innerHTML = `
                    <div class="footer-tag" id="gw-footer-btn" style="cursor:pointer;user-select:none">
                        <div class="dot" style="background:${gwColor}"></div>
                        <span>${gwLabel}</span>
                    </div>
                    <div class="footer-tag">
                        <div class="dot" style="background:${beaconColor}"></div>
                        <span>${onlineCount} beacon${onlineCount !== 1 ? 's' : ''} détecté${onlineCount !== 1 ? 's' : ''}</span>
                    </div>
                    <div class="footer-tag"><span>v1.0.0</span></div>`;
                document.getElementById('gw-footer-btn').addEventListener('click', () => {
                    const p = document.getElementById('gw-panel');
                    p.style.display = p.style.display === 'none' ? 'block' : 'none';
                });

                // Panneau détail
                if (msg.gateways) {
                    document.getElementById('gw-panel-list').innerHTML = msg.gateways.map(gw => `
                        <div style="display:flex;align-items:center;gap:10px;padding:9px 14px;border-top:1px solid rgba(45,65,95,0.2)">
                            <div style="width:8px;height:8px;border-radius:50%;flex-shrink:0;background:${gw.online ? '#28a068' : '#c44030'};${gw.online ? 'box-shadow:0 0 5px #28a068' : ''}"></div>
                            <div>
                                <div style="font-size:11px;font-weight:600;color:#c8d6e5">${gw.name}</div>
                                <div style="font-size:10px;color:#4a6080;margin-top:1px">${gw.ip || gw.id} — <span style="color:${gw.online ? '#28a068' : '#c44030'}">${gw.online ? 'En ligne' : 'Hors ligne'}</span></div>
                            </div>
                        </div>`).join('');
                }
            };
            ws.onclose = () => setTimeout(connectAlerts, 5000);
            setInterval(() => { if (ws.readyState === 1) ws.send('ping'); }, 20000);
        })();
    </script>

</body>
</html>
